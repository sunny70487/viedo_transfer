<!DOCTYPE html>
<html lang="zh-TW" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字幕編輯器 - Whisper 轉錄應用</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/themes.css?v=3" rel="stylesheet">
    <link href="/static/css/style.css?v=3" rel="stylesheet">
    <link href="/static/css/subtitle-editor.css?v=3" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <header class="py-2 mb-3 border-bottom">
            <div class="container d-flex flex-wrap justify-content-between align-items-center">
                <a href="/" class="d-flex align-items-center text-decoration-none" style="color: var(--theme-text-primary);">
                    <i class="bi bi-soundwave fs-5 me-2" style="opacity: 0.7;"></i>
                    <span class="fs-5 fw-semibold">字幕編輯器</span>
                </a>
                <div class="d-flex align-items-center gap-2">
                    <div class="dropdown">
                        <button class="btn btn-outline-secondary dropdown-toggle" type="button" id="theme-dropdown" data-bs-toggle="dropdown" aria-expanded="false" title="主題設定">
                            <i class="bi bi-palette"></i>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="theme-dropdown">
                            <li><a class="dropdown-item" href="#" id="theme-light-btn">
                                <i class="bi bi-sun-fill me-2"></i>淺色模式
                            </a></li>
                            <li><a class="dropdown-item" href="#" id="theme-dark-btn">
                                <i class="bi bi-moon-fill me-2"></i>深色模式
                            </a></li>
                            <li><a class="dropdown-item" href="#" id="theme-auto-btn">
                                <i class="bi bi-circle-half me-2"></i>跟隨系統
                            </a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" id="theme-settings-btn">
                                <i class="bi bi-gear me-2"></i>主題設定
                            </a></li>
                        </ul>
                    </div>
                    <a href="/" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> 返回
                    </a>
                </div>
            </div>
        </header>

        <main class="container-fluid">
            <!-- 載入狀態 -->
            <div id="loading-container" class="text-center py-5">
                <div class="spinner-border text-primary spinner-border-sm" role="status" style="width: 2rem; height: 2rem;">
                    <span class="visually-hidden">載入中...</span>
                </div>
                <p class="mt-3 text-secondary" style="font-size: 0.9rem;">正在載入字幕編輯器...</p>
            </div>

            <!-- 編輯工具欄 -->
            <div id="editing-toolbar" class="row mb-3" style="display: none;">
                <div class="col-12">
                    <div class="card shadow-sm">
                        <div class="card-body py-2">
                            <div class="d-flex flex-wrap justify-content-between align-items-center gap-2">
                                <!-- 左側工具組 -->
                                <div class="d-flex flex-wrap align-items-center gap-2">
                                    <div class="btn-group btn-group-sm" role="group" aria-label="編輯工具">
                                        <button type="button" class="btn btn-outline-secondary" id="undo-btn" title="復原" disabled>
                                            <i class="bi bi-arrow-counterclockwise"></i>
                                            <span class="d-none d-md-inline ms-1">復原</span>
                                        </button>
                                        <button type="button" class="btn btn-outline-secondary" id="redo-btn" title="重做" disabled>
                                            <i class="bi bi-arrow-clockwise"></i>
                                            <span class="d-none d-md-inline ms-1">重做</span>
                                        </button>
                                    </div>
                                    <div class="vr d-none d-md-block"></div>
                                    <div class="btn-group btn-group-sm" role="group" aria-label="字幕操作">
                                        <button type="button" class="btn btn-outline-primary" id="add-subtitle-toolbar-btn" title="新增字幕">
                                            <i class="bi bi-plus-circle"></i>
                                            <span class="d-none d-lg-inline ms-1">新增</span>
                                        </button>
                                        <button type="button" class="btn btn-outline-info" id="auto-sync-btn" title="自動同步">
                                            <i class="bi bi-arrow-repeat"></i>
                                            <span class="d-none d-lg-inline ms-1">同步</span>
                                        </button>
                                    </div>
                                </div>

                                <!-- 中間狀態顯示 -->
                                <div class="d-flex align-items-center gap-2 flex-grow-1 justify-content-center">
                                    <div id="edit-status" class="badge bg-secondary d-none">
                                        <i class="bi bi-pencil"></i> 編輯中
                                    </div>
                                    <div id="sync-status" class="badge bg-info d-none">
                                        <i class="bi bi-arrow-repeat"></i> 同步中
                                    </div>
                                    <div id="save-status" class="badge bg-success d-none">
                                        <i class="bi bi-check-circle"></i> 已儲存
                                    </div>
                                </div>

                                <!-- 右側操作組 -->
                                <div class="d-flex flex-wrap align-items-center gap-2">
                                    <div class="btn-group btn-group-sm" role="group" aria-label="檔案操作">
                                        <button type="button" class="btn btn-outline-warning" id="reset-btn" title="重置所有變更">
                                            <i class="bi bi-arrow-clockwise"></i>
                                            <span class="d-none d-md-inline ms-1">重置</span>
                                        </button>
                                        <button type="button" class="btn btn-primary" id="save-subtitles-toolbar" title="儲存變更">
                                            <i class="bi bi-save"></i>
                                            <span class="d-none d-md-inline ms-1">儲存</span>
                                        </button>
                                    </div>
                                    <div class="dropdown">
                                        <button class="btn btn-success btn-sm dropdown-toggle" type="button" id="export-dropdown-toolbar" data-bs-toggle="dropdown" aria-expanded="false" title="匯出字幕">
                                            <i class="bi bi-download"></i>
                                            <span class="d-none d-md-inline ms-1">匯出</span>
                                        </button>
                                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="export-dropdown-toolbar">
                                            <li><a class="dropdown-item" href="#" data-format="srt">
                                                <i class="bi bi-file-text me-2"></i>SRT 格式
                                            </a></li>
                                            <li><a class="dropdown-item" href="#" data-format="vtt">
                                                <i class="bi bi-file-code me-2"></i>VTT 格式
                                            </a></li>
                                            <li><a class="dropdown-item" href="#" data-format="txt">
                                                <i class="bi bi-file-earmark-text me-2"></i>純文字
                                            </a></li>
                                            <li><hr class="dropdown-divider"></li>
                                            <li><a class="dropdown-item" href="#" id="advanced-export-toolbar-btn">
                                                <i class="bi bi-gear me-2"></i>進階匯出選項
                                            </a></li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 字幕編輯器主界面 -->
            <div id="subtitle-editor-container" class="row" style="display: none;">
                <!-- 影片播放器區域 -->
                <div class="col-xl-6 col-lg-12 mb-3" id="video-section">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="card-title mb-0">
                                <i class="bi bi-play-circle"></i> 影片播放器
                            </h5>
                            <div class="d-flex align-items-center gap-2">
                                <!-- 佈局切換按鈕 (僅在中等螢幕顯示) -->
                                <div class="btn-group btn-group-sm d-lg-none d-md-flex" role="group" aria-label="佈局切換">
                                    <button type="button" class="btn btn-outline-secondary" id="layout-video-btn" title="顯示影片">
                                        <i class="bi bi-play-circle"></i>
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary" id="layout-subtitle-btn" title="顯示字幕">
                                        <i class="bi bi-list-ul"></i>
                                    </button>
                                </div>
                                <div class="btn-group btn-group-sm" role="group">
                                    <button type="button" class="btn btn-outline-secondary" id="play-pause-btn">
                                        <i class="bi bi-play-fill"></i>
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary" id="rewind-btn">
                                        <i class="bi bi-skip-backward"></i>
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary" id="forward-btn">
                                        <i class="bi bi-skip-forward"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="card-body p-0">
                            <div id="video-player-container" class="position-relative">
                                <video id="video-player" class="w-100" controls preload="metadata">
                                    <!-- 字幕軌道將通過 JavaScript 動態添加（不預設 track 以避免 CORS 問題） -->
                                    <p>您的瀏覽器不支援 HTML5 影片播放。</p>
                                </video>
                                <div id="video-overlay" class="position-absolute top-0 start-0 w-100 h-100 d-none">
                                    <div class="d-flex justify-content-center align-items-center h-100">
                                        <div class="text-center text-white">
                                            <i class="bi bi-exclamation-triangle" style="font-size: 2rem; opacity: 0.8;"></i>
                                            <p class="mt-2 mb-0" style="font-size: 0.9rem;">影片載入失敗</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <!-- 時間軸和控制項 -->
                            <div class="p-3 border-top">
                                <div class="d-flex align-items-center gap-2">
                                    <span id="current-time" class="text-muted small">00:00</span>
                                    <div class="flex-grow-1">
                                        <input type="range" class="form-range" id="video-progress" min="0" max="100" value="0">
                                    </div>
                                    <span id="total-time" class="text-muted small">00:00</span>
                                </div>
                                <div class="d-flex align-items-center justify-content-between mt-2">
                                    <div class="d-flex align-items-center gap-2">
                                        <i class="bi bi-volume-up" style="font-size: 0.85rem;"></i>
                                        <input type="range" class="form-range" id="volume-control" min="0" max="100" value="100" style="width: 90px;">
                                    </div>
                                    <div class="d-flex align-items-center gap-3">
                                        <button type="button" class="cc-toggle-btn active" id="cc-toggle-btn" title="開啟/關閉字幕">
                                            <i class="bi bi-badge-cc-fill"></i>
                                        </button>
                                        <div class="d-flex align-items-center gap-2">
                                            <label for="playback-speed" class="form-label mb-0 text-secondary" style="font-size: 0.78rem;">速度</label>
                                            <select id="playback-speed" class="form-select form-select-sm" style="width: auto;">
                                                <option value="0.5">0.5x</option>
                                                <option value="0.75">0.75x</option>
                                                <option value="1" selected>1x</option>
                                                <option value="1.25">1.25x</option>
                                                <option value="1.5">1.5x</option>
                                                <option value="2">2x</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 字幕列表區域 -->
                <div class="col-xl-6 col-lg-12 mb-3" id="subtitle-section">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="card-title mb-0">
                                <i class="bi bi-list-ul"></i> 字幕列表
                                <span class="badge bg-secondary ms-2" id="subtitle-count">0</span>
                            </h5>
                            <div class="d-flex align-items-center gap-2">
                                <!-- 搜尋框 -->
                                <div class="input-group input-group-sm d-none d-md-flex" style="width: 200px;">
                                    <input type="text" class="form-control" id="subtitle-search" placeholder="搜尋字幕...">
                                    <button class="btn btn-outline-secondary" type="button" id="clear-search-btn">
                                        <i class="bi bi-x"></i>
                                    </button>
                                </div>
                                <div class="btn-group btn-group-sm" role="group">
                                    <button type="button" class="btn btn-outline-primary" id="add-subtitle-btn">
                                        <i class="bi bi-plus"></i>
                                        <span class="d-none d-lg-inline ms-1">新增</span>
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary" id="sync-toggle-btn">
                                        <i class="bi bi-arrow-repeat"></i>
                                        <span class="d-none d-lg-inline ms-1">同步</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="card-body p-0">
                            <div id="subtitle-list-container" class="subtitle-list-scroll">
                                <div id="subtitle-list" class="list-group list-group-flush">
                                    <!-- 字幕項目將在這裡動態生成 -->
                                </div>
                                <div id="subtitle-empty-state" class="text-center py-5 text-muted">
                                    <i class="bi bi-chat-square-text"></i>
                                    <p>尚無字幕內容</p>
                                    <p class="small" style="opacity: 0.5; margin-top: -0.25rem;">載入影片後字幕將自動顯示</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 錯誤狀態 -->
            <div id="error-container" class="text-center py-5" style="display: none;">
                <div class="alert alert-danger d-inline-block text-start" style="max-width: 420px;">
                    <div class="d-flex align-items-start gap-3">
                        <i class="bi bi-exclamation-triangle" style="font-size: 1.5rem; opacity: 0.8; flex-shrink: 0; margin-top: 0.15rem;"></i>
                        <div>
                            <h6 class="mb-1 fw-semibold">載入失敗</h6>
                            <p id="error-message" class="mb-3" style="font-size: 0.875rem; opacity: 0.85;">載入字幕編輯器時發生錯誤</p>
                            <button class="btn btn-sm btn-primary" onclick="location.reload()">
                                <i class="bi bi-arrow-clockwise me-1"></i> 重新載入
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 字幕編輯模態框 -->
    <div class="modal fade" id="subtitle-edit-modal" tabindex="-1" aria-labelledby="subtitle-edit-modal-label" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="subtitle-edit-modal-label">
                        <i class="bi bi-pencil-square me-2" style="opacity: 0.6;"></i>編輯字幕
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="subtitle-edit-form">
                        <div class="mb-3">
                            <label for="subtitle-text" class="form-label">字幕文字</label>
                            <textarea class="form-control" id="subtitle-text" rows="3" required style="line-height: 1.6;"></textarea>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="start-time" class="form-label">開始時間</label>
                                <input type="text" class="form-control" id="start-time" placeholder="00:00:00.000" required>
                            </div>
                            <div class="col-md-6">
                                <label for="end-time" class="form-label">結束時間</label>
                                <input type="text" class="form-control" id="end-time" placeholder="00:00:00.000" required>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-danger me-auto" id="delete-subtitle-btn">
                        <i class="bi bi-trash"></i> 刪除
                    </button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="save-subtitle-btn">
                        <i class="bi bi-check-lg"></i> 儲存
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 進階匯出模態框 -->
    <div class="modal fade" id="advanced-export-modal" tabindex="-1" aria-labelledby="advanced-export-modal-label" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="advanced-export-modal-label">
                        <i class="bi bi-download me-2" style="opacity: 0.6;"></i>進階匯出選項
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- 格式選擇區域 -->
                    <div id="format-selector-container">
                        <!-- 格式選擇器將在這裡動態生成 -->
                    </div>
                    
                    <!-- 匯出選項 -->
                    <div class="mt-4">
                        <h6 class="mb-3">匯出選項</h6>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="include-timestamps" checked>
                                    <label class="form-check-label" for="include-timestamps">
                                        包含時間戳記
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="include-metadata" checked>
                                    <label class="form-check-label" for="include-metadata">
                                        包含元資料
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="include-confidence">
                                    <label class="form-check-label" for="include-confidence">
                                        包含信心度分數
                                    </label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="encoding-select" class="form-label">文字編碼</label>
                                    <select class="form-select" id="encoding-select">
                                        <option value="utf-8" selected>UTF-8</option>
                                        <option value="utf-16">UTF-16</option>
                                        <option value="big5">Big5</option>
                                        <option value="gb2312">GB2312</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label for="line-ending-select" class="form-label">行尾字元</label>
                                    <select class="form-select" id="line-ending-select">
                                        <option value="lf" selected>LF (Unix/Linux)</option>
                                        <option value="crlf">CRLF (Windows)</option>
                                        <option value="cr">CR (Mac)</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 批次下載選項 -->
                    <div class="mt-4">
                        <h6 class="mb-3">批次下載</h6>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="batch-download">
                            <label class="form-check-label" for="batch-download">
                                同時下載多種格式
                            </label>
                        </div>
                        <div class="mt-2 text-muted small">
                            <i class="bi bi-info-circle"></i> 
                            勾選此選項將會下載所有選中的格式，並打包成 ZIP 檔案
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="start-advanced-export">
                        <i class="bi bi-download"></i> 開始匯出
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 字幕項目模板 -->
    <template id="subtitle-item-template">
        <div class="list-group-item subtitle-item" data-index="">
            <div class="d-flex justify-content-between align-items-start">
                <div class="flex-grow-1 min-width-0">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <small class="text-muted subtitle-timing"></small>
                        <div class="btn-group btn-group-sm ms-2" role="group">
                            <button type="button" class="btn btn-outline-secondary split-btn" title="分割">
                                <i class="bi bi-scissors"></i>
                            </button>
                            <button type="button" class="btn btn-outline-secondary merge-btn" title="合併">
                                <i class="bi bi-union"></i>
                            </button>
                            <button type="button" class="btn btn-outline-danger delete-btn" title="刪除">
                                <i class="bi bi-trash"></i>
                            </button>
                            <button type="button" class="btn btn-outline-primary edit-btn" title="編輯">
                                <i class="bi bi-pencil"></i>
                            </button>
                        </div>
                    </div>
                    <p class="subtitle-text mb-0"></p>
                </div>
            </div>
        </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/theme-manager.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (window.themeManager) {
                const currentTheme = window.themeManager.getCurrentTheme() || 'light';
                const root = document.documentElement;
                root.setAttribute('data-bs-theme', currentTheme);
                root.classList.remove('theme-light', 'theme-dark');
                root.classList.add(`theme-${currentTheme}`);
            }
        });
    </script>
    <script src="/static/js/theme-settings.js"></script>
    <!-- 錯誤處理和載入管理 -->
    <script src="/static/js/error-handler.js"></script>
    <script src="/static/js/loading-manager.js"></script>
    <script src="/static/js/error-loading-integration.js"></script>
    <!-- 影片格式檢測工具 -->
    <script src="/static/js/video-format-detector.js"></script>
    
    <!-- 影片字幕同步 -->
    <script src="/static/js/video-subtitle-sync.js"></script>
    
    <!-- 字幕編輯器組件 -->
    <script src="/static/js/subtitle-download-manager.js"></script>
    <script src="/static/js/retranscribe-manager.js"></script>
    <script src="/static/js/subtitle-editor.js"></script>
    <script>
        // 主題設定按鈕事件
        document.addEventListener('DOMContentLoaded', function() {
            // 主題快速切換按鈕
            document.getElementById('theme-light-btn')?.addEventListener('click', (e) => {
                e.preventDefault();
                window.themeManager?.setTheme('light');
            });
            
            document.getElementById('theme-dark-btn')?.addEventListener('click', (e) => {
                e.preventDefault();
                window.themeManager?.setTheme('dark');
            });
            
            document.getElementById('theme-auto-btn')?.addEventListener('click', (e) => {
                e.preventDefault();
                if (window.themeManager) {
                    window.themeManager.options.autoDetect = true;
                    window.themeManager.setTheme(window.themeManager.systemTheme);
                }
            });
            
            // 主題設定按鈕
            document.getElementById('theme-settings-btn')?.addEventListener('click', (e) => {
                e.preventDefault();
                window.themeSettings?.show();
            });
        });
    </script>
    <script>
        // 設置任務 ID 給 subtitle-editor.js 使用
        window.SUBTITLE_EDITOR_TASK_ID = '{{ task_id }}';
        
        // 立即清理所有可能的遮罩層
        (function forceCleanupOverlays() {
            console.log('[CleanupScript] 強制清理遮罩層');
            
            // 立即執行清理
            function cleanup() {
                // 清理 skeleton-container
                const skeletonContainer = document.getElementById('skeleton-container');
                if (skeletonContainer) {
                    skeletonContainer.style.display = 'none';
                    skeletonContainer.style.pointerEvents = 'none';
                    console.log('[CleanupScript] skeleton-container 已隱藏');
                }
                
                // 清理 progress-container
                const progressContainer = document.getElementById('progress-container');
                if (progressContainer) {
                    progressContainer.style.display = 'none';
                    progressContainer.style.pointerEvents = 'none';
                    console.log('[CleanupScript] progress-container 已隱藏');
                }
                
                // 清理 loading-container
                const loadingContainer = document.getElementById('loading-container');
                if (loadingContainer) {
                    loadingContainer.style.display = 'none';
                    console.log('[CleanupScript] loading-container 已隱藏');
                }
                
                // 強制確保編輯器可見和可交互
                const editorContainer = document.getElementById('subtitle-editor-container');
                if (editorContainer) {
                    editorContainer.style.display = 'flex';
                    editorContainer.style.pointerEvents = 'auto';
                    editorContainer.style.zIndex = '1';
                }
                
                const toolbar = document.getElementById('editing-toolbar');
                if (toolbar) {
                    toolbar.style.display = 'block';
                    toolbar.style.pointerEvents = 'auto';
                }
                
                // 確保所有按鈕可點擊
                document.querySelectorAll('button, .btn, a').forEach(el => {
                    el.style.pointerEvents = 'auto';
                });
                
                console.log('[CleanupScript] 清理完成');
            }
            
            // 立即執行一次
            cleanup();
            
            // DOM 載入後再執行一次
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', cleanup);
            } else {
                setTimeout(cleanup, 0);
            }
            
            // 延遲執行確保所有腳本都載入完成後再清理一次
            setTimeout(cleanup, 500);
            setTimeout(cleanup, 1000);
            setTimeout(cleanup, 2000);
        })();
        
        /**
         * 處理頁面離開前的確認
         */
        window.addEventListener('beforeunload', function(e) {
            // 檢查是否有未儲存的變更
            if (window.subtitleEditor && window.subtitleEditor.isDirty) {
                e.preventDefault();
                e.returnValue = '您有未儲存的變更，確定要離開嗎？';
                return e.returnValue;
            }
        });
    </script>
