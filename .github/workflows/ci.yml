name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install minimal quality dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install pydantic==2.11.9 fastapi==0.117.1 httpx==0.28.1

      - name: Run flake8 on tests and shared helpers
        run: python -m flake8 tests backend/shared/video_utils.py

      - name: Run regression tests
        run: python -m pytest tests/test_models.py tests/test_task_persistence.py tests/test_subtitle_api_smoke.py tests/test_subtitle_api_store.py tests/test_video_utils.py -q
