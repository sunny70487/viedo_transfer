name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install minimal quality dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install pydantic==2.11.9 fastapi==0.117.1 httpx==0.28.1 sqlalchemy==2.0.36

      - name: Run flake8 on tests, shared helpers, and services
        run: python -m flake8 tests backend/shared backend/services backend/models.py backend/task_persistence.py

      - name: Run regression tests
        run: python -m pytest tests/ -q
